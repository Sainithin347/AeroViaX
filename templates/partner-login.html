<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login | AeroViaX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h2 class="auth-title">Partner Login</h2>
        <p class="auth-subtitle">Manage your customer orders, amount details, and service schedules.</p>

        {% if message %}
        <p class="auth-subtitle">{{ message }}</p>
        {% endif %}

        <form method="POST" class="auth-form">
            <input type="email" name="email" placeholder="Registered Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="auth-btn">Login</button>
        </form>

        <p class="auth-switch">New service holder?</p>
        <a href="/partner/become" class="auth-link-btn">Become a Partner</a>
    </div>
</body>
</html>
