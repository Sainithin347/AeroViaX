<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Partner | AeroViaX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h2 class="auth-title">Become a Partner</h2>
        <p class="auth-subtitle">Create your service-holder account to manage customers and bookings.</p>

        {% if message %}
        <p class="auth-subtitle">{{ message }}</p>
        {% endif %}

        <form method="POST" class="auth-form">
            <input type="text" name="holder_name" placeholder="Your Name" required>
            <input type="text" name="company_name" placeholder="Company Name" required>
            <input type="email" name="email" placeholder="Business Email" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="password" name="password" placeholder="Create Password" required>
            <input type="text" name="location" placeholder="Service Location" required>
            <input type="text" name="service" placeholder="Primary Service" required>
            <button type="submit" class="auth-btn">Submit Request</button>
        </form>

        <p class="auth-switch">Already a partner?</p>
        <a href="/partner/login" class="auth-link-btn">Partner Login</a>
    </div>
</body>
</html>
